<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FonoCRM — Perfil do Paciente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbf6ee; --surface: #fffdf8; --surface-warm: #f1e3cf;
      --fg: #201914; --fg-2: #4c4037; --muted: #7a6d63;
      --meta: #9b5b32; --border: #ded2c3; --border-soft: #eee4d7;
      --accent: #9b5b32; --accent-on: #ffffff;
      --accent-hover: color-mix(in oklab, var(--accent), black 8%);
      --accent-active: color-mix(in oklab, var(--accent), black 14%);
      --accent-soft: rgba(155,91,50,0.08);
      --success: #4f8a4f; --warn: #c9822f; --danger: #b33a3a;
      --font-display: Georgia, "Times New Roman", serif;
      --font-body: Inter, system-ui, sans-serif;
      --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
      --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px; --radius-pill: 9999px;
      --focus-ring: 0 0 0 4px rgba(155,91,50,0.24);
      --motion-fast: 150ms; --motion-base: 240ms;
      --ease-standard: cubic-bezier(0.2,0,0,1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: var(--bg); color: var(--fg); font-family: var(--font-body); font-size: var(--text-base); line-height: var(--leading-body); -webkit-font-smoothing: antialiased; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 700; font-family: var(--font-display); margin-bottom: 32px; padding: 0 8px; }
    .sidebar-logo span { font-size: 22px; }
    .sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); color: var(--fg-2); font-size: 14px; font-weight: 500; text-decoration: none; transition: all var(--motion-fast); }
    .sidebar nav a:hover, .sidebar nav a.active { background: var(--accent-soft); color: var(--fg); }
    .sidebar nav a.active { color: var(--accent); }
    .sidebar .logout { margin-top: auto; padding: 10px 12px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: color var(--motion-fast), border-color var(--motion-fast); }
    .sidebar .logout:hover { color: var(--danger); border-color: var(--danger); }
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; margin-bottom: 20px; text-decoration: none; transition: color var(--motion-fast); }
    .back-link:hover { color: var(--fg); }
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
    .avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--accent-soft); display: grid; place-items: center; font-size: 28px; flex-shrink: 0; }
    .profile-info h1 { font-size: 22px; font-weight: 600; }
    .profile-info .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
    .info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; transition: border-color var(--motion-fast), box-shadow var(--motion-fast); }
    .info-card:hover { border-color: var(--accent); box-shadow: var(--elev-raised); }
    .info-card h3 { font-size: 13px; color: var(--fg-2); font-weight: 600; margin-bottom: 12px; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--muted); }
    .info-row .value { color: var(--fg); font-weight: 500; }
    .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; transition: border-color var(--motion-fast); }
    .history-card:hover { border-color: var(--accent); }
    .history-card h3 { font-size: 13px; color: var(--fg-2); font-weight: 600; margin-bottom: 12px; }
    .history-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-family: var(--font-mono); font-size: 12px; color: var(--muted); min-width: 80px; }
    .history-info { flex: 1; font-size: 13px; }
    .history-info strong { color: var(--fg); }
    .history-info .meta { color: var(--muted); font-size: 12px; display: block; }
    .status-badge { display: inline-flex; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 500; transition: background var(--motion-fast); }
    .status-badge.lead { background: rgba(183,121,31,0.10); color: var(--warn); }
    .status-badge.agendado { background: rgba(17,17,17,0.06); color: var(--accent); }
    .status-badge.realizado { background: rgba(22,138,70,0.10); color: var(--success); }
    .status-badge.retorno { background: rgba(58,58,58,0.08); color: var(--fg-2); }
    .status-badge.inativo { background: rgba(112,112,112,0.08); color: var(--muted); }
    .btn-sec { padding: 10px 18px; background: transparent; color: var(--fg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; transition: background var(--motion-fast), border-color var(--motion-fast); }
    .btn-sec:hover { border-color: var(--fg-2); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><span>🗣️</span> FonoCRM</div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="pacientes.html" class="active">👥 Pacientes</a>
        <a href="kanban.html">📋 Kanban</a>
        <a href="agenda.html">📅 Agenda</a>
        <a href="relatorios.html">📈 Relatórios</a>
      </nav>
      <a href="#" onclick="sair();return false;" style="display:flex;align-items:center;gap:8px;margin-top:auto;padding:10px 12px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-size:13px;cursor:pointer;text-decoration:none;">🚪 Sair</a>
    </aside>
    <main class="main">
      <a href="pacientes.html" class="back-link">← Voltar para Pacientes</a>
      <div id="content"></div>
    </main>
  </div>

  <script>
    function sair() { window.location.href = 'login.html'; }
    function getData(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch(_) { return []; } }

    var params = new URLSearchParams(window.location.search);
    var pacienteId = params.get('id');

    function loadPaciente() {
      if (!pacienteId) {
        document.getElementById('content').innerHTML = '<p style="color: var(--muted);">Paciente não encontrado.</p>';
        return;
      }

      var pacientes = getData('fono_crm_pacientes');
      var paciente = pacientes.find(function(p) { return p.id == pacienteId; });

      if (!paciente) {
        document.getElementById('content').innerHTML = '<p style="color: var(--muted);">Paciente não encontrado.</p>';
        return;
      }

      var consultas = getData('fono_crm_consultas').filter(function(c) { return c.paciente_id == pacienteId; }).sort(function(a, b) { return b.data.localeCompare(a.data); });

      var statusLabel = { lead: '📥 Lead', agendado: '📅 Agendado', realizado: '✅ Realizado', retorno: '🔄 Retorno', inativo: '❌ Inativo' };

      var pedidoHtml = '<div class="info-row"><span class="label">Pedido Médico</span><span class="value">' + (paciente.pedido_medico === 'sim' ? '<span style="color:var(--success);">Sim</span>' : '<span style="color:var(--muted);">Não</span>') + '</span></div>';
      if (paciente.pedido_medico === 'sim' && paciente.pedido_file) {
        pedidoHtml += '<div class="info-row"><span class="label">Arquivo</span><span class="value"><button class="btn-sec" style="font-size:12px;padding:4px 10px;" onclick="window.open(\'' + paciente.pedido_file + '\',\'_blank\')">👁️ Visualizar PDF</button></span></div>';
      }

      document.getElementById('content').innerHTML =
        '<div class="profile-header"><div class="avatar">👤</div><div class="profile-info"><h1>' + (paciente.nome || 'Sem nome') + '</h1><div class="meta"><span class="status-badge ' + (paciente.status || 'lead') + '">' + (statusLabel[paciente.status] || 'Lead') + '</span>' + (paciente.responsavel ? ' · Resp: ' + paciente.responsavel : '') + '</div></div></div>' +
        '<div class="profile-grid"><div class="info-card"><h3>Informações Pessoais</h3>' +
        '<div class="info-row"><span class="label">Nome Completo</span><span class="value">' + (paciente.nome || '—') + '</span></div>' +
        '<div class="info-row"><span class="label">Responsável</span><span class="value">' + (paciente.responsavel || '—') + '</span></div>' +
        '<div class="info-row"><span class="label">Data de Nascimento</span><span class="value">' + (paciente.data_nascimento ? new Date(paciente.data_nascimento + 'T12:00:00').toLocaleDateString('pt-BR') : '—') + '</span></div>' +
        '<div class="info-row"><span class="label">WhatsApp</span><span class="value">' + (paciente.whatsapp || '—') + '</span></div>' +
        pedidoHtml +
        '</div>' +
        '<div class="info-card"><h3>Procedimento</h3>' +
        '<div class="info-row"><span class="label">Exame / Procedimento</span><span class="value">' + (paciente.procedimento || '—') + '</span></div>' +
        '<div class="info-row"><span class="label">Cadastro</span><span class="value">' + (paciente.created_at ? new Date(paciente.created_at).toLocaleDateString('pt-BR') : '—') + '</span></div></div></div>' +
        '<div class="history-card" style="margin-top:16px;"><h3>Histórico de Consultas</h3>' +
        (consultas.length === 0 ? '<p style="color: var(--muted); font-size: 13px;">Nenhuma consulta registrada.</p>' :
          consultas.map(function(c) {
            return '<div class="history-item"><div class="history-date">' + new Date(c.data).toLocaleDateString('pt-BR') + '</div><div class="history-info"><strong>' + (c.exame || 'Consulta') + '</strong><span class="meta">' + (c.status || 'agendado') + (c.valor ? ' · R$ ' + parseFloat(c.valor).toFixed(2) : '') + '</span></div></div>';
          }).join('')) +
        '</div>';
    }

    loadPaciente();
  </script>
</body>
</html>
