<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FonoCRM — Relatórios</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbf6ee; --surface: #fffdf8; --surface-warm: #f1e3cf;
      --fg: #201914; --fg-2: #4c4037; --muted: #7a6d63;
      --meta: #9b5b32; --border: #ded2c3; --border-soft: #eee4d7;
      --accent: #9b5b32; --accent-on: #ffffff;
      --accent-hover: color-mix(in oklab, var(--accent), black 8%);
      --accent-active: color-mix(in oklab, var(--accent), black 14%);
      --accent-soft: rgba(155,91,50,0.08);
      --success: #4f8a4f; --warn: #c9822f; --danger: #b33a3a;
      --font-display: Georgia, "Times New Roman", serif;
      --font-body: Inter, system-ui, sans-serif;
      --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
      --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px; --radius-pill: 9999px;
      --focus-ring: 0 0 0 4px rgba(155,91,50,0.24);
      --motion-fast: 150ms; --motion-base: 240ms;
      --ease-standard: cubic-bezier(0.2,0,0,1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: var(--bg); color: var(--fg); font-family: var(--font-body); font-size: var(--text-base); line-height: var(--leading-body); -webkit-font-smoothing: antialiased; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 700; font-family: var(--font-display); margin-bottom: 32px; padding: 0 8px; }
    .sidebar-logo span { font-size: 22px; }
    .sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); color: var(--fg-2); font-size: 14px; font-weight: 500; text-decoration: none; transition: all var(--motion-fast); }
    .sidebar nav a:hover, .sidebar nav a.active { background: var(--accent-soft); color: var(--fg); }
    .sidebar nav a.active { color: var(--accent); }
    .sidebar .logout { margin-top: auto; padding: 10px 12px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: color var(--motion-fast), border-color var(--motion-fast); }
    .sidebar .logout:hover { color: var(--danger); border-color: var(--danger); }
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    .main h1 { font-size: 26px; font-weight: 700; font-family: var(--font-display); margin-bottom: 24px; }
    .period-selector { display: flex; gap: 8px; margin-bottom: 24px; }
    .period-selector button { padding: 8px 16px; background: var(--surface-2); color: var(--fg-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; transition: background var(--motion-fast), border-color var(--motion-fast); }
    .period-selector button.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
    .period-selector button:hover { border-color: var(--accent); }
    .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 768px) { .report-grid { grid-template-columns: 1fr; } }
    .report-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; transition: border-color var(--motion-fast); }
    .report-card:hover { border-color: var(--accent); }
    .report-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--fg-2); }
    .report-card canvas { max-height: 280px; }
    .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 768px) { .summary-row { grid-template-columns: 1fr; } }
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; text-align: center; transition: border-color var(--motion-fast); }
    .summary-card:hover { border-color: var(--accent); }
    .summary-card .sum-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--font-mono); margin-bottom: 8px; }
    .summary-card .sum-value { font-size: 24px; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><span>🗣️</span> FonoCRM</div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="pacientes.html">👥 Pacientes</a>
        <a href="kanban.html">📋 Kanban</a>
        <a href="agenda.html">📅 Agenda</a>
        <a href="relatorios.html" class="active">📈 Relatórios</a>
      </nav>
      <a href="#" onclick="sair();return false;" style="display:flex;align-items:center;gap:8px;margin-top:auto;padding:10px 12px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-size:13px;cursor:pointer;text-decoration:none;">🚪 Sair</a>
    </aside>
    <main class="main">
      <h1>Relatórios</h1>
      <div class="period-selector">
        <button class="active" data-period="mes" onclick="setPeriod('mes')">Este Mês</button>
        <button data-period="trimestre" onclick="setPeriod('trimestre')">Trimestre</button>
        <button data-period="ano" onclick="setPeriod('ano')">Este Ano</button>
      </div>
      <div class="summary-row" id="summaryRow">
        <div class="summary-card"><div class="sum-label">Faturamento</div><div class="sum-value" id="sumFaturamento">—</div></div>
        <div class="summary-card"><div class="sum-label">Exames Realizados</div><div class="sum-value" id="sumExames">—</div></div>
        <div class="summary-card"><div class="sum-label">Novos Pacientes</div><div class="sum-value" id="sumPacientes">—</div></div>
      </div>
      <div class="report-grid">
        <div class="report-card"><h3>Faturamento Mensal</h3><canvas id="chartFaturamento"></canvas></div>
        <div class="report-card"><h3>Exames Realizados</h3><canvas id="chartExames"></canvas></div>
      </div>
    </main>
  </div>

  <script>
    function sair() { window.location.href = 'login.html'; }
    function getData(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch(_) { return []; } }

    var currentPeriod = 'mes';
    var chartFat = null;
    var chartExames = null;

    function setPeriod(p) {
      currentPeriod = p;
      document.querySelectorAll('.period-selector button').forEach(function(b) { b.classList.remove('active'); });
      document.querySelector('.period-selector button[data-period="' + p + '"]').classList.add('active');
      loadReports();
    }

    function getDateRange() {
      var now = new Date();
      var start;
      if (currentPeriod === 'mes') { start = new Date(now.getFullYear(), now.getMonth(), 1); }
      else if (currentPeriod === 'trimestre') { start = new Date(now.getFullYear(), now.getMonth() - 2, 1); }
      else { start = new Date(now.getFullYear(), 0, 1); }
      return { start: start.toISOString().split('T')[0], end: now.toISOString().split('T')[0] };
    }

    function loadReports() {
      var range = getDateRange();
      var consultas = getData('fono_crm_consultas').filter(function(c) { return c.data >= range.start && c.data <= range.end + 'T23:59:59'; });
      var pacientes = getData('fono_crm_pacientes').filter(function(p) { return p.created_at && p.created_at >= range.start; });

      var fatTotal = consultas.reduce(function(s, c) { return s + (parseFloat(c.valor) || 0); }, 0);
      document.getElementById('sumFaturamento').textContent = 'R$ ' + fatTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
      document.getElementById('sumExames').textContent = consultas.length;
      document.getElementById('sumPacientes').textContent = pacientes.length;

      var fatPorMes = {};
      consultas.forEach(function(c) {
        var mes = c.data.slice(0, 7);
        fatPorMes[mes] = (fatPorMes[mes] || 0) + (parseFloat(c.valor) || 0);
      });
      var meses = Object.keys(fatPorMes).sort();
      var fatValues = meses.map(function(m) { return fatPorMes[m]; });

      if (chartFat) chartFat.destroy();
      chartFat = new Chart(document.getElementById('chartFaturamento'), {
        type: 'bar',
        data: {
          labels: meses.map(function(m) {
            var parts = m.split('-');
            var date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1);
            return date.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
          }),
          datasets: [{
            label: 'Faturamento', data: fatValues,
            backgroundColor: 'rgba(155,91,50,0.12)', borderColor: '#9b5b32',
            borderWidth: 1, borderRadius: 4,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#707070', font: { size: 11 } }, grid: { color: '#d9d9d9' } },
            y: { ticks: { color: '#707070', font: { size: 11 } }, grid: { color: '#d9d9d9' }, beginAtZero: true }
          }
        }
      });

      var examesAgrupar = {};
      consultas.forEach(function(c) {
        var exame = c.exame || 'Não informado';
        examesAgrupar[exame] = (examesAgrupar[exame] || 0) + 1;
      });
      var exLabels = Object.keys(examesAgrupar);
      var exData = Object.values(examesAgrupar);
      var colors = ['#9b5b32', '#4f8a4f', '#c9822f', '#b33a3a', '#4c4037', '#7a6d63', '#ded2c3'];

      if (chartExames) chartExames.destroy();
      chartExames = new Chart(document.getElementById('chartExames'), {
        type: 'doughnut',
        data: { labels: exLabels, datasets: [{ data: exData, backgroundColor: colors.slice(0, exLabels.length) }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { color: '#3a3a3a', font: { size: 11 } } } }
        }
      });
    }

    loadReports();
  </script>
</body>
</html>
